

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenidos - Región Sur Totalplay</title>
    <style>
        :root{
            --morado: #6A1B9A;
            --verde:  #00C853;
            --gris-fondo: #f4f4f4;
            --texto: #333;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--gris-fondo);
            color: var(--texto);
            text-align: center;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        /* Header con logo + título */
        header {
            background: linear-gradient(90deg, var(--morado), var(--verde));
            color: #fff;
        }
        .header-inner{
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand img.logo {
            height: 44px;                  /* Altura del logo en desktop */
            width: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,.25)); /* ligera lectura sobre el gradiente */
        }
        .brand h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 0.4px;
            line-height: 1.2;
            text-align: left;
        }
        @media (max-width: 560px){
            .header-inner{ padding: 14px 14px; gap: 10px; }
            .brand img.logo{ height: 36px; } /* Logo más compacto en móvil */
            .brand h1{ font-size: 1.35rem; }
        }

        main.container {
            padding: 40px 20px 20px;
            flex: 1;
        }
        h2 { color: var(--morado); margin-top: 0; }
        h3 { color: var(--verde); }
        .construction-img {
            width: 90%;
            max-width: 420px;
            display: block;
            margin: 14px auto;
            border-radius: 10px;
            border: 3px solid rgba(106, 27, 154, 0.15);
        }
        .badge {
            display: inline-block;
            background: #fff;
            color: var(--morado);
            border: 2px solid var(--morado);
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: 700;
            margin-top: 8px;
        }
        footer {
            margin-top: 10px;
            padding: 14px 10px;
            background: var(--morado);
            color: #fff;
            font-size: 0.95rem;
        }
        /* Accesibilidad: enfoque visible para enlaces (si agregas alguno) */
        a:focus-visible, button:focus-visible {
            outline: 3px solid #fff;
            outline-offset: 2px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<header role="banner">
    <div class="header-inner">
        <div class="brand">
            <!-- Reemplaza el src con la ruta/URL del logo oficial -->
            https://www.totalplay.com.mx/
            <h1>Región Sur Totalplay</h1>
        </div>
    </div>
</header>

<main class="container" role="main">
    <h2>¡Bienvenidos!</h2>
    <p>Este sitio está en construcción…</p>
    <h3>Aquí se construyen <strong>IDEAS</strong> 💡</h3>
    <span class="badge">Pronto más contenido</span>

    <!-- Imágenes de placeholder -->
    <img
        class="construction-img"
       ffff?text=Sitio+en+Construccion

    https://via.placeholder.com/420x160/00C853/ffffff?text=Totalplay+Region+Sur
</main>

<footer role="contentinfo">
    © 2026 Región Sur Totalplay — En construcción
</footer>

</body>
</html>
